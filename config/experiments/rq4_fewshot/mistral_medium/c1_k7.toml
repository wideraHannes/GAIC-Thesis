[experiment]
experiment_name = "rq4_fewshot_k7"
sample_size = 60
output_dir = "experiments/rq4_fewshot/mistral_medium"

[llm]
provider = "mistral"
model = "mistral-medium-latest"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 7    # 7 positive + 7 negative = 14 total examples

[datasets]
enabled = ["IAM"]
