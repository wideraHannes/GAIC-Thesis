# GAIC Embedding Analysis — Mistral-7B-Instruct

[experiment]
experiment_name = "embedding_analysis"
sample_size = 30
output_dir = "experiments/embedding_outputs"

[model]
name = "mistralai/Mistral-7B-Instruct-v0.3"
dtype = "float16"
batch_size = 8

[umap]
n_neighbors = 15
min_dist = 0.1
n_components = 2
metric = "cosine"
random_state = 42

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]
