# ============================================================================
# DCQ (Data Contamination Quiz) Configuration - TACO Only
# Based on Golchin & Surdeanu (TACL 2025)
# ============================================================================

experiment_name = "dcq_contamination_test_taco"

# ----------------------------------------------------------------------------
# PHASE 1: Perturbation Generation
# ----------------------------------------------------------------------------
[phase1]
provider = "openai"
model = "gpt-4.1"
temperature = 1.0
max_retries = 3

# ----------------------------------------------------------------------------
# PHASE 2: Bias Detector Quiz (BDQ)
# ----------------------------------------------------------------------------
[phase2]
temperature = 0
max_tokens = 10
samples_per_dataset = 10
output_dir = "bdq_results"

# ----------------------------------------------------------------------------
# PHASE 3: Bias Compensator Quiz (BCQ)
# ----------------------------------------------------------------------------
[phase3]
temperature = 0
max_tokens = 10
bias_threshold = 0.20
output_dir = "bcq_results"

# ----------------------------------------------------------------------------
# Data Sampling
# ----------------------------------------------------------------------------
[sampling]
samples_per_dataset = 50
split = "test"

# ----------------------------------------------------------------------------
# Datasets - TACO Only
# ----------------------------------------------------------------------------
[datasets]
enabled = ["TACO"]

# ----------------------------------------------------------------------------
# Output Structure
# ----------------------------------------------------------------------------
[output]
base_dir = "experiments/dcq"
