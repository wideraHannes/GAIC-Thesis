[experiment]
experiment_name = "rq4_fewshot_k5"
sample_size = 60
output_dir = "experiments/rq4_fewshot/mistral_medium"

[llm]
provider = "mistral"
model = "mistral-medium-latest"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 5    # 5 positive + 5 negative = 10 total examples

[datasets]
enabled = ["IAM"]
