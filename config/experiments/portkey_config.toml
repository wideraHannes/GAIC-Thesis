# GAIC Experiment Configuration — Portkey (GPT-4.1 via Azure OpenAI Foundry)

[experiment]
sample_size = 10  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "portkey"
model = "@azure-openai-foundry/gpt-4.1"
temperature = 0.0
max_tokens = 5

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]

[prompts]
system = """You are a binary text classifier. Your task is to classify sentences as either "Argument" or "No-Argument" based on a provided definition. Respond with exactly one label: Argument or No-Argument. Do not explain."""

user = """Definition:
{definition}

Sentence:
{sentence}

Label:"""
