# GAIC Experiment Configuration

[experiment]
sample_size = 10  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "ollama"  # "ollama" or "openai"
model = "llama3.1:8b"
temperature = 0.0
max_tokens = 5
api_key = ""  # only needed for openai

[context]
sources = ["definition", "guideline"]  # which context files to load: "definition", "guideline"

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]

[prompts]
system = """You are a binary text classifier. Your task is to classify sentences as either "Argument" or "No-Argument". Respond with exactly one label: Argument or No-Argument. Do not explain.

{context}"""

user = """{sentence}"""
