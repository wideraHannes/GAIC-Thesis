[experiment]
experiment_name = "rq4_fewshot_k5"
sample_size = 60
output_dir = "experiments/rq4_fewshot/gpt_5_2_openai"

[llm]
provider = "openai"
model = "gpt-5.2-2025-12-11"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 5    # 5 positive + 5 negative = 10 total examples

[datasets]
enabled = ["IAM"]
