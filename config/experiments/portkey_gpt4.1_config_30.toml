# GAIC Experiment Configuration — Portkey (GPT-4.1 via Azure OpenAI Foundry)

[experiment]
sample_size = 30  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "portkey"
model = "@azure-openai-foundry/gpt-4.1"
temperature = 0.0
max_tokens = 5

[context]
sources = ["definition"]  # which context files to load: "definition", "guideline"

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]
