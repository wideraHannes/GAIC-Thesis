# GAIC Experiment Configuration

[experiment]
sample_size = 10  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "ollama"  # "ollama" or "openai"
model = "llama3.1:8b"
temperature = 0.0
max_tokens = 5
api_key = ""  # only needed for openai

[context]
sources = ["definition"]  # which context files to load: "definition", "guideline"

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]
