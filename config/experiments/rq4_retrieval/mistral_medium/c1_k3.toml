[experiment]
experiment_name = "rq4_retrieval_k3"
sample_size = 60
output_dir = "experiments/rq4_retrieval/mistral_medium"

[llm]
provider = "mistral"
model = "mistral-medium-latest"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 3                      # 3 Arg + 3 No-Arg = 6 total examples
strategy = "retrieval"     # similarity-based retrieval from ChromaDB

[datasets]
enabled = ["IAM"]
