# GAIC Experiment Configuration — Together AI

[experiment]
sample_size = 10  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "together_ai"
model = "moonshotai/Kimi-K2.5"
temperature = 0.0
max_tokens = 5

[context]
sources = ["definition"]  # which context files to load: "definition", "guideline"

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]

[prompts]
system = """You are a binary text classifier. Your task is to classify sentences as either "Argument" or "No-Argument" based on the provided context. Respond with exactly one label: Argument or No-Argument. Do not explain."""

user = """{context}

Sentence:
{sentence}

Label:"""
