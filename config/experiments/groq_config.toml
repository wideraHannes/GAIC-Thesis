# GAIC Experiment Configuration — Groq (llama-3.1-8b-instant)

[experiment]
sample_size = 100  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "groq"
model = "llama-3.1-8b-instant"
temperature = 0.0
max_tokens = 5

[context]
sources = ["definition"]  # which context files to load: "definition", "guideline"

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]

[prompts]
system = """You are a binary text classifier. Your task is to classify sentences as either "Argument" or "No-Argument". Respond with exactly one label: Argument or No-Argument. Do not explain.

{context}"""

user = """{sentence}"""
