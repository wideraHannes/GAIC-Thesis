[experiment]
experiment_name = "rq4_fewshot_k3"
sample_size = 60
output_dir = "experiments/rq4_fewshot/gpt_5_2_openai"

[llm]
provider = "openai"
model = "gpt-5.2-2025-12-11"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 3    # 3 positive + 3 negative = 6 total examples

[datasets]
enabled = ["IAM"]
