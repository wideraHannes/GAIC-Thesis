# GAIC Experiment Configuration — Test Document Context
# This config enables document context (preceding sentences) in addition to definition and guideline

[experiment]
experiment_name = "full"
sample_size = 30  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "portkey"
model = "@azure-openai-foundry/gpt-4.1"
temperature = 0.0

[context]
# To enable document context (2 preceding sentences), add "document_context" to sources
# Options: "definition", "guideline", "document_context"
sources = ["definition", "guideline", "document_context"]

[datasets]
# Test with datasets that have document context available
enabled = [
    "ABSTRCT",
    "ARGUMINSCI",
    "PE",
    "USELEC",
]
