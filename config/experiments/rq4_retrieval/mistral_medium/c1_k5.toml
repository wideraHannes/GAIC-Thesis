[experiment]
experiment_name = "rq4_retrieval_k5"
sample_size = 60
output_dir = "experiments/rq4_retrieval/mistral_medium"

[llm]
provider = "mistral"
model = "mistral-medium-latest"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 5                      # 5 Arg + 5 No-Arg = 10 total examples
strategy = "retrieval"     # similarity-based retrieval from ChromaDB

[datasets]
enabled = ["IAM"]
