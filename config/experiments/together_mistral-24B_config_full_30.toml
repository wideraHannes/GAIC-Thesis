# GAIC Experiment Configuration — Together AI (Mistral-24B Full Context)
# This config enables document context (preceding sentences) in addition to definition and guideline

[experiment]
experiment_name = "full"
sample_size = 30  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "together_ai"
model = "mistralai/Mistral-Small-24B-Instruct-2501"
temperature = 0.0

[context]
# Full context: definition + guideline + document context (2 preceding sentences)
sources = ["definition", "guideline", "document_context"]

[datasets]
# Only datasets with guidelines and document context available
enabled = [
    "ABSTRCT",
    "ARGUMINSCI",
    "PE",
    "USELEC",
]
