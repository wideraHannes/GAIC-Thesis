[experiment]
experiment_name = "c0"
sample_size = 30
output_dir = "experiments/v3/mistral_medium"

[llm]
provider = "mistral"
model = "mistral-medium-latest"
temperature = 0.0

[context]
sources = ["zero_shot"]

[datasets]
enabled = ["ABSTRCT", "ACQUA", "AEC", "AFS", "ARGUMINSCI", "FINARG", "IAM", "PE", "SCIARK", "USELEC"]
