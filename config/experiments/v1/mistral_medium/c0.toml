[experiment]
experiment_name = "c0"
sample_size = 30
output_dir = "experiments/v1/mistral_medium"

[llm]
provider = "mistral"
model = "mistral-medium-latest"
temperature = 0.0
max_tokens = 5

[context]
sources = ["simple_definition"]

[datasets]
enabled = ["ABSTRCT", "ACQUA", "AEC", "AFS", "ARGUMINSCI", "FINARG", "IAM", "PE", "SCIARK", "USELEC"]
