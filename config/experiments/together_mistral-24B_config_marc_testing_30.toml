# GAIC Experiment Configuration — Together AI (Mistral-24B Guidelines)

[experiment]
experiment_name = "guidelines"
sample_size = 30  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "together_ai"
model = "mistralai/Mistral-Small-24B-Instruct-2501"
temperature = 0.0
max_tokens = 5

[context]
sources = ["definition"]  # which context files to load

[datasets]
# Only datasets with available guidelines
enabled = [
    "AEC",
]
