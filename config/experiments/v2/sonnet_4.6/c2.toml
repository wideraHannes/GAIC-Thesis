# GAIC Experiment Configuration — Portkey (Claude Sonnet 4.6 via Vertex AI)
# c2: Definition + Guideline

[experiment]
experiment_name = "c2"
sample_size = 30  # balanced Argument / No-Argument per dataset
output_dir = "experiments/v2/sonnet_4.6"

[llm]
provider = "portkey"
model = "@vertex-ai/anthropic.claude-sonnet-4-6"
temperature = 0.0

[context]
sources = ["definition", "guideline"]

[datasets]
# Only datasets with available guidelines
enabled = [
    "ABSTRCT",
    "ARGUMINSCI",
    "PE",
    "USELEC",
]
