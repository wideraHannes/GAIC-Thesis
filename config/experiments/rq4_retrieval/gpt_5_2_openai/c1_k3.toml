[experiment]
experiment_name = "rq4_retrieval_k3"
sample_size = 60
output_dir = "experiments/rq4_retrieval/gpt_5_2_openai"

[llm]
provider = "openai"
model = "gpt-5.2-2025-12-11"
temperature = 0.0

[context]
sources = ["definition"]

[few_shot]
k = 3                      # 3 Arg + 3 No-Arg = 6 total examples
strategy = "retrieval"     # similarity-based retrieval from ChromaDB

[datasets]
enabled = ["IAM"]
