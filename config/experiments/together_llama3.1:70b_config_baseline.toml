# GAIC Experiment Configuration — Together AI (Llama 3.1 8B Baseline)

[experiment]
experiment_name = "baseline"
sample_size = 30  # balanced Argument / No-Argument per dataset
output_dir = "experiments/unified_outputs"

[llm]
provider = "together_ai"
model = "meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo"
temperature = 0.0

[context]
sources = ["definition"]  # baseline only uses definition, no guidelines

[datasets]
enabled = [
    "ABSTRCT",
    "ACQUA",
    "AEC",
    "AFS",
    "ARGUMINSCI",
    "FINARG",
    "IAM",
    "PE",
    "SCIARK",
    "USELEC",
]
