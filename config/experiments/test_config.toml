# GAIC Quick Test Configuration
# Use this for quick testing with small sample size

[experiment]
type = "both"
sample_size = 10  # Small sample for quick testing
output_dir = "experiments/unified_outputs"

[llm]
provider = "ollama"
model = "llama3.1:8b"
temperature = 0.0
max_tokens = 5
api_key = ""

[datasets]
# Test with just one dataset first
enabled = [
    "ABSTRCT",
]

[manipulation]
enabled = true
manipulations = ["M0", "M1", "M2"]
metrics = ["f1_macro", "delta_feger", "delta_shuffle"]

[context]
enabled = true
levels = ["C0", "C1", "C2", "C3"]
metrics = ["f1_macro", "delta_context"]

[context.document]
strategy = "preceding_sentences"
num_preceding_sentences = 2

[context.guidelines]
use_extracted = true
fallback_to_definition = true

[prompts]
system = """You are an argument classifier.
Classify the following sentence as "Argument" or "No-Argument".
Respond with only the label, nothing else."""

base_template = """Definition: In this dataset, an argument is a sentence that {definition}

{guidelines_section}{document_section}Classify the following sentence as "Argument" or "No-Argument".
Respond with only the label.

Sentence: {sentence}"""

guidelines_template = """Labeling instructions: {guidelines}

"""

document_template = """Document context: {document_context}

"""
